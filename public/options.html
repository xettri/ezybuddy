<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>EzyBuddy Settings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #e5e7eb;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 12px;
      }
      p.description {
        font-size: 13px;
        margin: 0 0 16px;
        color: #9ca3af;
      }
      .card {
        background: radial-gradient(circle at top, #0f172a 0, #020617 55%);
        border-radius: 14px;
        padding: 16px 18px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.9);
        max-width: 640px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #9ca3af;
        margin-bottom: 4px;
      }
      input,
      textarea {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(15, 23, 42, 0.9);
        color: #e5e7eb;
        font-size: 13px;
        box-sizing: border-box;
        outline: none;
      }
      input:focus,
      textarea:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 1px rgba(79, 70, 229, 0.5);
      }
      .field-row {
        margin-bottom: 10px;
      }
      .field-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px 12px;
      }
      button.primary {
        margin-top: 10px;
        padding: 8px 14px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #4f46e5, #22c55e);
        color: white;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        box-shadow: 0 14px 30px rgba(34, 197, 94, 0.5);
      }
      button.primary:active {
        transform: translateY(1px);
        box-shadow: 0 10px 24px rgba(34, 197, 94, 0.45);
      }
      .status {
        margin-top: 8px;
        font-size: 12px;
        color: #22c55e;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>EzyBuddy profile</h1>
    <p class="description">
      Store your basic details once. EzyBuddy will use them to help you fill forms faster.
    </p>
    <div class="card">
      <div class="field-grid">
        <div class="field-row">
          <label for="eb-name">Full name</label>
          <input id="eb-name" type="text" placeholder="Jane Doe" />
        </div>
        <div class="field-row">
          <label for="eb-email">Email</label>
          <input id="eb-email" type="email" placeholder="you@example.com" />
        </div>
        <div class="field-row">
          <label for="eb-phone">Phone</label>
          <input id="eb-phone" type="tel" placeholder="+1 555 000 1234" />
        </div>
        <div class="field-row">
          <label for="eb-location">Location</label>
          <input id="eb-location" type="text" placeholder="City, Country" />
        </div>
      </div>
      <div class="field-row">
        <label for="eb-summary">Short professional summary</label>
        <textarea
          id="eb-summary"
          rows="3"
          placeholder="1–3 sentences you’d usually paste into job forms."
        ></textarea>
      </div>
      <button class="primary" id="eb-save">Save profile</button>
      <div class="status" id="eb-status"></div>
    </div>
    <script src="options.js"></script>
  </body>
  </html>
